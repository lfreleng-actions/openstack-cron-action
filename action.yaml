# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: '☁️ OpenStack Cron Cleanup'
description: 'Automated cleanup of orphaned OpenStack cloud resources'

branding:
  icon: 'cloud-off'
  color: 'blue'

inputs:
  # OpenStack Configuration
  openstack_cloud:
    description: 'OpenStack cloud name from clouds.yaml'
    required: true
    default: 'vex'

  clouds_yaml:
    description: 'OpenStack clouds.yaml configuration (base64 encoded)'
    required: false
    default: ''

  # OpenStack Credentials (alternative to clouds_yaml)
  openstack_auth_url:
    description: 'OpenStack auth URL'
    required: false
    default: ''
  openstack_username:
    description: 'OpenStack username'
    required: false
    default: ''
  openstack_password:
    description: |
      OpenStack password (base64 encoded or plain text - will auto-decode)
    required: false
    default: ''
  openstack_project_id:
    description: 'OpenStack project ID'
    required: false
    default: ''
  openstack_domain_name:
    description: 'OpenStack domain name'
    required: false
    default: 'Default'
  openstack_region:
    description: 'OpenStack region'
    required: false
    default: ''

  # Jenkins Integration
  jenkins_urls:
    description: >
      Space-separated list of Jenkins URLs to check for active builds
    required: false
    default: ''

  # Cleanup Control Flags
  cleanup_k8s_clusters:
    description: 'Enable K8s cluster cleanup'
    required: false
    default: 'true'

  cleanup_stacks:
    description: 'Enable OpenStack stack cleanup'
    required: false
    default: 'true'

  cleanup_servers:
    description: 'Enable server/instance cleanup'
    required: false
    default: 'true'

  cleanup_ports:
    description: 'Enable port cleanup'
    required: false
    default: 'true'

  cleanup_volumes:
    description: 'Enable volume cleanup'
    required: false
    default: 'true'

  protect_images:
    description: 'Enable protection of in-use images'
    required: false
    default: 'true'

  cleanup_images:
    description: 'Enable old image cleanup'
    required: false
    default: 'true'

  cleanup_images_smart:
    description: 'Enable smart image cleanup (checks repo for images in use)'
    required: false
    default: 'false'

  # Cleanup Parameters
  image_cleanup_age:
    description: 'Age in days for image cleanup (default: 180 = 6 months)'
    required: false
    default: '180'

  port_cleanup_age:
    description: 'Age for port cleanup (default: 30 minutes ago)'
    required: false
    default: '30 minutes ago'

  # Python Environment
  python_version:
    description: 'Python version to use'
    required: false
    default: '3.11'

  # Timeouts
  build_timeout:
    description: 'Build timeout in minutes'
    required: false
    default: '10'

  # Debug Mode
  enable_debug:
    description: 'Enable debug mode for verbose logging'
    required: false
    default: 'false'

  # Notifications
  failure_notification_email:
    description: >
      Email address to notify on failure (comma-separated)
    required: false
    default: ''

  failure_notification_prefix:
    description: 'Email subject prefix for failure notifications'
    required: false
    default: '[OpenStack Cleanup]'

outputs:
  cleanup_summary:
    description: 'Summary of cleanup operations performed'
    value: ${{ steps.summary.outputs.summary }}

  resources_cleaned:
    description: 'Number of resources cleaned up'
    value: ${{ steps.summary.outputs.resources_cleaned }}

  cleanup_status:
    description: 'Overall cleanup status (success/failure)'
    value: ${{ steps.summary.outputs.status }}

  smart_cleanup_unprotected:
    description: 'Number of images unprotected by smart cleanup'
    value: ${{ steps.cleanup-images-smart.outputs.unprotected_count || '0' }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_OPENSTACK_CLOUD: ${{ inputs.openstack_cloud }}
        INPUT_CLOUDS_YAML: ${{ inputs.clouds_yaml }}
        INPUT_OPENSTACK_AUTH_URL: ${{ inputs.openstack_auth_url }}
      run: |
        if [[ -z "$INPUT_OPENSTACK_CLOUD" ]]; then
          echo "❌ Error: openstack_cloud is required"
          exit 1
        fi

        # Validate that either clouds_yaml OR credentials are provided
        if [[ -z "$INPUT_CLOUDS_YAML" ]] && \
           [[ -z "$INPUT_OPENSTACK_AUTH_URL" ]]; then
          echo "❌ Error: Either clouds_yaml or OpenStack credentials required"
          echo "   Provide clouds_yaml OR" \
            "(auth_url + username + password + project_id)"
          exit 1
        fi

        echo "✅ Input validation passed"

    - name: Setup Python
      # yamllint disable-line rule:line-length
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install dependencies
      shell: bash
      run: |
        echo "📦 Installing OpenStack dependencies..."
        pip install --upgrade pip --quiet
        pip install --quiet \
          "lftools[openstack]" \
          python-openstackclient \
          python-heatclient \
          python-magnumclient \
          kubernetes \
          niet \
          yq

        echo "✅ Dependencies installed"

    - name: Configure OpenStack credentials
      shell: bash
      env:
        INPUT_CLOUDS_YAML: ${{ inputs.clouds_yaml }}
        INPUT_OPENSTACK_AUTH_URL: ${{ inputs.openstack_auth_url }}
        INPUT_OPENSTACK_CLOUD: ${{ inputs.openstack_cloud }}
        INPUT_OPENSTACK_USERNAME: ${{ inputs.openstack_username }}
        INPUT_OPENSTACK_PASSWORD: ${{ inputs.openstack_password }}
        INPUT_OPENSTACK_PROJECT_ID: ${{ inputs.openstack_project_id }}
        INPUT_OPENSTACK_DOMAIN_NAME: ${{ inputs.openstack_domain_name }}
        INPUT_OPENSTACK_REGION: ${{ inputs.openstack_region }}
      run: |
        echo "🔐 Configuring OpenStack credentials..."
        mkdir -p "$HOME/.config/openstack"
        # Restrict permissions for the whole creation window so clouds.yaml is
        # never world/group-readable, even momentarily before chmod runs.
        umask 077

        # Create clouds.yaml from base64 input or generate from credentials
        if [[ -n "$INPUT_CLOUDS_YAML" ]]; then
          printf '%s' "$INPUT_CLOUDS_YAML" | base64 -d > \
            "$HOME/.config/openstack/clouds.yaml"
          chmod 600 "$HOME/.config/openstack/clouds.yaml"
          echo "✅ Using provided clouds.yaml"
        elif [[ -n "$INPUT_OPENSTACK_AUTH_URL" ]]; then
          # Auto-generate clouds.yaml from individual credentials
          cloud_name="$INPUT_OPENSTACK_CLOUD"
          auth_url="$INPUT_OPENSTACK_AUTH_URL"
          username="$INPUT_OPENSTACK_USERNAME"

          # Decode password if base64 encoded (silent for security)
          password="$INPUT_OPENSTACK_PASSWORD"
          if printf '%s' "$password" | base64 -d &> /dev/null; then
            password=$(printf '%s' "$password" | base64 -d)
          fi
          # Mask the decoded password to prevent log exposure. Mask line by
          # line: this both masks the real value and prevents a newline in the
          # value from injecting an additional workflow command into the log
          # command stream.
          while IFS= read -r mask_line; do
            [ -n "$mask_line" ] && echo "::add-mask::${mask_line}"
          done <<< "$password"

          project_id="$INPUT_OPENSTACK_PROJECT_ID"
          domain_name="$INPUT_OPENSTACK_DOMAIN_NAME"
          region="$INPUT_OPENSTACK_REGION"

          cat > "$HOME/.config/openstack/clouds.yaml" << EOF
        clouds:
          ${cloud_name}:
            auth:
              auth_url: ${auth_url}
              username: ${username}
              password: ${password}
              project_id: ${project_id}
              user_domain_name: ${domain_name}
              project_domain_name: ${domain_name}
            region_name: ${region}
        EOF
          chmod 600 "$HOME/.config/openstack/clouds.yaml"
          echo "✅ Generated clouds.yaml from credentials"
        fi

        # Verify clouds.yaml. Use fixed-string matching (-F) and '--' so the
        # cloud name is never interpreted as a regex or as an option, even if
        # it contains metacharacters or begins with '-'.
        cloud="$INPUT_OPENSTACK_CLOUD"
        if ! grep -qF -- "$cloud" \
          "$HOME/.config/openstack/clouds.yaml"; then
          echo "❌ Error: Cloud '$cloud' not found in clouds.yaml"
          exit 1
        fi

        echo "✅ OpenStack credentials configured"

    - name: Cleanup K8s Clusters
      if: ${{ inputs.cleanup_k8s_clusters == 'true' }}
      id: cleanup-k8s
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        JENKINS_URLS: ${{ inputs.jenkins_urls }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up orphaned K8s clusters..."
        bash "$ACTION_PATH/scripts/cleanup-k8s-clusters.sh"

    - name: Cleanup Stacks
      if: ${{ inputs.cleanup_stacks == 'true' }}
      id: cleanup-stacks
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        JENKINS_URLS: ${{ inputs.jenkins_urls }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up orphaned stacks..."
        bash "$ACTION_PATH/scripts/cleanup-stacks.sh"

    - name: Cleanup Servers
      if: ${{ inputs.cleanup_servers == 'true' }}
      id: cleanup-servers
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        JENKINS_URLS: ${{ inputs.jenkins_urls }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up orphaned servers..."
        bash "$ACTION_PATH/scripts/cleanup-servers.sh"

    - name: Cleanup Ports
      if: ${{ inputs.cleanup_ports == 'true' }}
      id: cleanup-ports
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up orphaned ports..."
        bash "$ACTION_PATH/scripts/cleanup-ports.sh"

    - name: Cleanup Volumes
      if: ${{ inputs.cleanup_volumes == 'true' }}
      id: cleanup-volumes
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up orphaned volumes..."
        bash "$ACTION_PATH/scripts/cleanup-volumes.sh"

    - name: Protect Images
      if: ${{ inputs.protect_images == 'true' }}
      id: protect-images
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🛡️ Protecting in-use images..."
        bash "$ACTION_PATH/scripts/protect-images.sh"

    - name: Cleanup Old Images
      if: ${{ inputs.cleanup_images == 'true' }}
      id: cleanup-images
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        OS_IMAGE_CLEANUP_AGE: ${{ inputs.image_cleanup_age }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧹 Cleaning up old images..."
        bash "$ACTION_PATH/scripts/cleanup-old-images.sh"

    - name: Smart Image Cleanup
      if: ${{ inputs.cleanup_images_smart == 'true' }}
      id: cleanup-images-smart
      shell: bash
      env:
        OS_CLOUD: ${{ inputs.openstack_cloud }}
        OS_IMAGE_CLEANUP_AGE: ${{ inputs.image_cleanup_age }}
        BUILDER_REPO_URL: https://github.com/${{ github.repository }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        DEBUG: ${{ inputs.enable_debug }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        echo "🧠 Running smart image cleanup..."
        bash "$ACTION_PATH/scripts/cleanup-images-smart.sh"

    - name: Generate cleanup summary
      if: always()
      id: summary
      shell: bash
      env:
        INPUT_OPENSTACK_CLOUD: ${{ inputs.openstack_cloud }}
        INPUT_CLEANUP_IMAGES_SMART: ${{ inputs.cleanup_images_smart }}
        STEP_K8S_COUNT: ${{ steps.cleanup-k8s.outputs.deleted_count || '0' }}
        STEP_STACKS_COUNT: ${{ steps.cleanup-stacks.outputs.deleted_count || '0' }}
        STEP_SERVERS_COUNT: ${{ steps.cleanup-servers.outputs.deleted_count || '0' }}
        STEP_PORTS_COUNT: ${{ steps.cleanup-ports.outputs.deleted_count || '0' }}
        STEP_VOLUMES_COUNT: ${{ steps.cleanup-volumes.outputs.deleted_count || '0' }}
        STEP_PROTECTED_COUNT: ${{ steps.protect-images.outputs.protected_count || '0' }}
        STEP_IMAGES_COUNT: ${{ steps.cleanup-images.outputs.deleted_count || '0' }}
        STEP_SMART_UNPROTECTED: ${{ steps.cleanup-images-smart.outputs.unprotected_count || '0' }}
      run: |
        # Collect outputs from all steps
        k8s_count="${STEP_K8S_COUNT:-0}"
        stacks_count="${STEP_STACKS_COUNT:-0}"
        servers_count="${STEP_SERVERS_COUNT:-0}"
        ports_count="${STEP_PORTS_COUNT:-0}"
        volumes_count="${STEP_VOLUMES_COUNT:-0}"
        protected_count="${STEP_PROTECTED_COUNT:-0}"
        images_count="${STEP_IMAGES_COUNT:-0}"
        smart_unprotected="${STEP_SMART_UNPROTECTED:-0}"

        sum1=$((k8s_count + stacks_count + servers_count))
        sum2=$((ports_count + volumes_count + images_count))
        total=$((sum1 + sum2))

        # Generate summary for GitHub Actions UI
        {
          echo "### 🧹 OpenStack Cleanup Summary"
          echo ""
          echo "**Cloud**: $INPUT_OPENSTACK_CLOUD"
          echo "**Status**: ✅ Completed"
          echo "**Timestamp**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "#### Resources Cleaned"
          echo "- 🔄 K8s Clusters: **${k8s_count}** deleted"
          echo "- 📚 Heat Stacks: **${stacks_count}** deleted"
          echo "- 🖥️ Servers: **${servers_count}** deleted"
          echo "- 🔌 Ports: **${ports_count}** deleted"
          echo "- 💾 Volumes: **${volumes_count}** deleted"
          echo "- 🛡️ Images Protected: **${protected_count}** images"
          echo "- 🗑️ Old Images: **${images_count}** deleted"
          if [[ "$INPUT_CLEANUP_IMAGES_SMART" == "true" ]]; then
            echo "- 🧠 Smart Cleanup: **${smart_unprotected}** images unprotected"
          fi
          echo ""
          echo "**Total Resources Cleaned**: **${total}**"
        } >> "$GITHUB_STEP_SUMMARY"

        # Set outputs
        echo "summary=Cleaned ${total} resources" >> "$GITHUB_OUTPUT"
        echo "resources_cleaned=${total}" >> "$GITHUB_OUTPUT"
        echo "status=success" >> "$GITHUB_OUTPUT"
