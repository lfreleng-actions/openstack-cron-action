name: Test Action

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  test-syntax:
    runs-on: ubuntu-latest
    # Default-deny at the workflow level; grant only the minimal scope the
    # job needs. actions/checkout requires contents:read (notably for
    # private/internal repositories).
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate action.yaml
        run: |
          echo "Checking action.yaml syntax..."
          cat action.yaml
          echo "✅ action.yaml is valid"

      - name: Check scripts exist
        run: |
          echo "Checking cleanup scripts..."
          ls -la scripts/
          test -f scripts/cleanup-k8s-clusters.sh
          test -f scripts/cleanup-stacks.sh
          test -f scripts/cleanup-servers.sh
          test -f scripts/cleanup-ports.sh
          test -f scripts/cleanup-volumes.sh
          test -f scripts/protect-images.sh
          test -f scripts/cleanup-old-images.sh
          echo "✅ All scripts exist"

      - name: Shellcheck scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
          echo "✅ Shellcheck passed"
